name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  core:
    name: Core (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]"

      - name: Run tests with coverage
        run: |
          python -m pytest ezfalcon/tests/ -o "addopts=" --cov=ezfalcon --cov-report=term-missing -q

  galpy-compat:
    name: galpy ${{ matrix.galpy-version }} (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        galpy-version: ["1.10", "1.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]"
          pip install "galpy==${{ matrix.galpy-version }}.*"

      - name: Run galpy-specific tests
        run: |
          python -m pytest ezfalcon/tests/test_galpy_bridge.py ezfalcon/tests/test_galpy_tools.py -o "addopts=" -q
